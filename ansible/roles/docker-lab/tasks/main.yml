# =============================================================================
# CloudLab — Docker Lab Role
# =============================================================================
# This role provisions a Docker container environment by installing:
#   - Docker Engine (CE) — From Docker's official APT repository
#   - Docker Compose      — Multi-container orchestration plugin
#
# After installation, it starts the Docker service, adds the lab user to
# the docker group, and verifies the installation.
# =============================================================================

---
# ---------------------------------------------------------------------------
# Step 1: Install prerequisite packages for Docker's APT repository
# ---------------------------------------------------------------------------
- name: "📦 Install Docker prerequisites"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

# ---------------------------------------------------------------------------
# Step 2: Add Docker's official GPG key for package verification
# ---------------------------------------------------------------------------
- name: "🔑 Add Docker GPG key"
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

# ---------------------------------------------------------------------------
# Step 3: Add Docker's official APT repository
# ---------------------------------------------------------------------------
- name: "📋 Add Docker APT repository"
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

# ---------------------------------------------------------------------------
# Step 4: Install Docker Engine and Compose plugin
# ---------------------------------------------------------------------------
- name: "🐳 Install Docker Engine and Compose"
  ansible.builtin.apt:
    name:
      - docker-ce              # Docker Engine (Community Edition)
      - docker-ce-cli          # Docker CLI tools
      - containerd.io          # Container runtime
      - docker-compose-plugin  # Docker Compose v2 (plugin)
    state: present
    update_cache: true

# ---------------------------------------------------------------------------
# Step 5: Start and enable the Docker service
# ---------------------------------------------------------------------------
- name: "🚀 Start and enable Docker service"
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# ---------------------------------------------------------------------------
# Step 6: Add the lab user to the docker group (run without sudo)
# ---------------------------------------------------------------------------
- name: "👤 Add azureuser to docker group"
  ansible.builtin.user:
    name: azureuser
    groups: docker
    append: true

# ---------------------------------------------------------------------------
# Step 7: Verify Docker installation
# ---------------------------------------------------------------------------
- name: "✅ Verify Docker version"
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: "📋 Display Docker version"
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"

# ---------------------------------------------------------------------------
# Step 8: Verify Docker Compose installation
# ---------------------------------------------------------------------------
- name: "✅ Verify Docker Compose version"
  ansible.builtin.command: docker compose version
  register: compose_version
  changed_when: false

- name: "📋 Display Docker Compose version"
  ansible.builtin.debug:
    msg: "{{ compose_version.stdout }}"

# ---------------------------------------------------------------------------
# Step 9: Run a test container to validate Docker is working
# ---------------------------------------------------------------------------
- name: "🧪 Run hello-world test container"
  ansible.builtin.command: docker run --rm hello-world
  register: hello_world
  changed_when: false

# ---------------------------------------------------------------------------
# Step 10: Create a workspace directory for lab exercises
# ---------------------------------------------------------------------------
- name: "📁 Create Docker lab workspace"
  ansible.builtin.file:
    path: /home/azureuser/docker-lab-workspace
    state: directory
    owner: azureuser
    group: azureuser
    mode: '0755'

- name: "🎉 Docker Lab setup complete"
  ansible.builtin.debug:
    msg: |
      ============================================
        🐳 Docker Lab Environment Ready!
        - Docker Engine (CE) installed
        - Docker Compose v2 installed
        - Service running and enabled
        - Workspace: /home/azureuser/docker-lab-workspace
      ============================================
